<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Ganti dengan konfigurasi Firebase Anda
        const firebaseConfig = { 
            apiKey: "AIzaSyAaMqHz_QvEpN_d-ns7vblfMs1EWZ6PJEk",
            authDomain: "tagihan-siswa-1f2df.firebaseapp.com",
            projectId: "tagihan-siswa-1f2df",
            storageBucket: "tagihan-siswa-1f2df.firebasestorage.app",
            messagingSenderId: "79229043495",
            appId: "1:79229043495:web:815d8c2ca375f711c5df02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.cariTagihan = async function() {
            const nisn = document.getElementById('nisn-input').value.trim();
            const ibu = document.getElementById('ibu-input').value.trim().toUpperCase();
            const hasilDiv = document.getElementById('hasil-tagihan');

            try {
                const docSnap = await getDoc(doc(db, "siswa", nisn));
                if (docSnap.exists() && docSnap.data().namaIbu.toUpperCase() === ibu) {
                    const d = docSnap.data();
                    hasilDiv.classList.remove('hidden');
                    hasilDiv.innerHTML = `<p><strong>Nama:</strong> ${d.nama}</p>
                                        <p><strong>Status:</strong> ${d.status}</p>
                                        <p><strong>Jumlah:</strong> ${d.jumlah}</p>`;
                } else {
                    alert("NISN atau Nama Ibu tidak cocok!");
                }
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Cek Tagihan</h2>
        <input type="text" id="nisn-input" placeholder="NISN" class="w-full p-2 border rounded mb-3">
        <input type="text" id="ibu-input" placeholder="Nama Ibu Kandung" class="w-full p-2 border rounded mb-4">
        <button onclick="cariTagihan()" class="w-full bg-blue-800 text-white p-2 rounded">Cari</button>
        <div id="hasil-tagihan" class="mt-6 hidden p-4 bg-gray-50 border rounded"></div>
        <a href="index.html" class="block text-center mt-4 text-blue-600 underline">Kembali ke Beranda</a>
    </div>
</body>
</html>
