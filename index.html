<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('bangunan-sekolah.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        /* Efek transisi untuk buka tutup menu */
        .submenu { transition: all 0.3s ease; }
    </style>
</head>
<body>

    <!-- Navbar (Tetap sama) -->
    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo-sekolah.png" alt="Logo" class="h-10 w-10 object-contain bg-white rounded-full">
                <h1 class="font-bold text-2xl">SD Plus Darussalam</h1>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 flex flex-col md:flex-row gap-6">
        
        <!-- KOLOM 1: MENU (Dulu Arsip) -->
        <aside class="w-full md:w-1/4">
            <h2 class="text-xl font-bold mb-4 border-b-2 border-gray-400 pb-2">MENU</h2>
            <div id="menu-container" class="bg-white/80 p-4 rounded shadow space-y-2">
                <!-- Menu akan muncul di sini -->
            </div>
        </aside>

        <!-- Kolom Berita & Pengumuman (Tetap sama) -->
        <!-- ... (bagian tengah dan kanan Anda) ... -->

    </main>

    <script>
        // Struktur data menu bertingkat
        const menuData = [
            {
                nama: "Capaian",
                sub: [
                    { nama: "Capaian Tahfidz", link: "https://bit.ly/hafalan-siswa" },
                    { nama: "Capaian Prestasi", link: "https://bit.ly/capaian-prestasi" }
                ]
            },
            {
                nama: "Video Tahsin",
                sub: [
                    { nama: "Jilid 1", link: "https://youtube.com/playlist?list=PLu6HscRiyP5Cba7L3r1lWyrFyHun5yGRs" },
                    { nama: "Jilid 2", link: "https://youtube.com/playlist?list=PLu6HscRiyP5B90-8hhIFB_vvaBLohinNR" }
                ]
            }
        ];

        const container = document.getElementById('menu-container');

        menuData.forEach((item, index) => {
            const menuDiv = document.createElement('div');
            menuDiv.innerHTML = `
                <button onclick="toggleMenu(${index})" class="w-full text-left font-bold text-blue-800 hover:text-blue-600 flex justify-between">
                    ${item.nama} <span>▼</span>
                </button>
                <ul id="sub-${index}" class="hidden pl-4 mt-1 space-y-1 border-l-2 border-blue-200">
                    ${item.sub.map(sub => `<li><a href="${sub.link}" target="_blank" class="text-gray-700 hover:text-blue-700 text-sm block">${sub.nama}</a></li>`).join('')}
                </ul>
            `;
            container.appendChild(menuDiv);
        });

        function toggleMenu(index) {
            const sub = document.getElementById(`sub-${index}`);
            sub.classList.toggle('hidden');
        }

        // Fungsi toggleBerita tetap sama
        function toggleBerita() {
            const lengkap = document.getElementById('konten-lengkap');
            const pendek = document.getElementById('konten-pendek');
            const btn = document.getElementById('btn-baca');
            lengkap.classList.toggle('hidden');
            pendek.classList.toggle('hidden');
            btn.innerText = lengkap.classList.contains('hidden') ? "Baca Selengkapnya →" : "← Sembunyikan";
        }
    </script>
</body>
</html>
